<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Hill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../content/img/favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#020100;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.scene{
  position:relative;
  width:min(900px,100vmin);
  height:min(900px,100vmin);
  background:#0a0704;
  overflow:hidden;
  box-shadow:0 0 120px rgba(0,0,0,1);
}

/* ══ WALL ══ */
.wall{
  position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 70% 80% at 50% 35%, #1c1208 0%, #120c04 50%, #080502 100%);
}
.wall-text{
  position:absolute;
  top:55%;
  left:45%;
  transform:translateX(-50%);
  max-width:72%;
  color:#000000;
  font-family:'Courier New', Courier, monospace;
  font-size:1.7rem;
  font-weight:400;
  letter-spacing:0.14em;
  text-align:center;
  line-height:1.3;
  pointer-events:none;
  z-index:1100;
}
.wall::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(92deg,transparent 22%,rgba(0,0,0,.04) 22.3%,transparent 22.6%),
    linear-gradient(185deg,transparent 48%,rgba(0,0,0,.03) 48.4%,transparent 48.8%),
    linear-gradient(87deg,transparent 61%,rgba(0,0,0,.04) 61.4%,transparent 61.8%),
    linear-gradient(178deg,transparent 35%,rgba(0,0,0,.03) 35.4%,transparent 35.8%);
  pointer-events:none;
}
.wall::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(0,0,0,.4) 0%,transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(0,0,0,.35) 0%,transparent 30%);
  pointer-events:none;
}

/* ══ AMBIENT GLOW – top centre ══ */
.ambient{
  position:absolute;left:0;top:0;right:0;
  height:60%;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,
      rgba(80,55,18,.28) 0%,
      rgba(55,35,8,.12) 45%,
      transparent 72%
    );
}

/* ══ FLOOR ══ */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:7%;z-index:5;
  background:linear-gradient(180deg,#0e0803 0%,#070402 100%);
  box-shadow:inset 0 6px 22px rgba(0,0,0,.9);
}

/* ══ VIGNETTE + PARTICLES ══ */
.vignette{
  position:absolute;inset:0;z-index:90;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.78) 100%);
}
#particles{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:91;pointer-events:none;
}
.page-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:62px;
  height:124px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(16,8,6,.62);
  border:1px solid rgba(255,80,80,.24);
  border-radius:28px;
  color:#ffc2c2;
  text-decoration:none;
  font-family:system-ui, sans-serif;
  font-size:.76rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-align:center;
  backdrop-filter:blur(8px);
  z-index:220;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}
.page-nav:hover{
  transform:translateY(-50%) scale(1.04);
  box-shadow:0 0 30px rgba(255,80,80,.28);
  border-color:rgba(255,120,120,.5);
}
.page-nav-left{left:18px;}
.page-nav-right{right:18px;}
.page-nav-icon{font-size:1.5rem;line-height:1;}
</style>

<script>
// ─────────────────────────────────────
//  DUST PARTICLE SYSTEM
// ─────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
const scene  = document.getElementById('scene');

let W, H;
function resize(){
  W = canvas.width  = scene.offsetWidth;
  H = canvas.height = scene.offsetHeight;
}
resize();
new ResizeObserver(resize).observe(scene);

const pts = Array.from({length:90}, (_, i) => {
  const upper = i < 60;
  return {
    x:  Math.random() * W,
    y:  Math.random() * H * (upper ? .65 : 1),
    vx: (Math.random() - .5) * .18,
    vy: -(Math.random() * .25 + .03),
    r:  Math.random() * 1.2 + .2,
    a:  Math.random() * (upper ? .4 : .15) + .06,
    ph: Math.random() * Math.PI * 2,
    sp: Math.random() * .004 + .0015,
    warm: Math.random() > .3,
  };
});

function tick(){
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x  += p.vx + Math.sin(p.ph) * .1;
    p.y  += p.vy;
    p.ph += p.sp;

    if(p.y < -4){
      p.y = H * .88;
      p.x = Math.random() * W;
      p.a = Math.random() * .35 + .06;
    }
    if(p.x < 0) p.x = W;
    if(p.x > W) p.x = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.warm
      ? `rgba(200,165,80,${p.a * .7})`
      : `rgba(160,140,100,${p.a * .35})`;
    ctx.fill();
  });
  requestAnimationFrame(tick);
}
tick();

// ─────────────────────────────────────
//  GREEN LED FLICKER (bottom unit display)
// ─────────────────────────────────────
const radioStack = document.getElementById('radio-stack');
let flickerDir = 1;
function flickerLED(){
  const texts = radioStack ? radioStack.querySelectorAll('text') : [];
  texts.forEach(t => {
    const op = parseFloat(t.getAttribute('opacity') || '0.88');
    const newOp = Math.max(.55, Math.min(.95, op + (Math.random()-.5)*.08));
    t.setAttribute('opacity', newOp.toFixed(2));
  });
}
setInterval(flickerLED, 300 + Math.random()*400);
</script>
