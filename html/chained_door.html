<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chained Door</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#020100;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.scene{
  position:relative;
  width:min(900px,100vmin);
  height:min(900px,100vmin);
  background:#0c0804;
  overflow:hidden;
  box-shadow:0 0 120px rgba(0,0,0,1);
}

/* ══════════════════════════════════════
   WALL
══════════════════════════════════════ */
.wall{
  position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 70% 80% at 50% 50%, #1a1614 0%, #121010 45%, #0a0808 100%);
}
.wall::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(92deg,transparent 22%,rgba(0,0,0,.04) 22.3%,transparent 22.6%),
    linear-gradient(187deg,transparent 38%,rgba(0,0,0,.04) 38.4%,transparent 38.8%),
    linear-gradient(84deg,transparent 55%,rgba(0,0,0,.03) 55.3%,transparent 55.7%),
    linear-gradient(176deg,transparent 70%,rgba(0,0,0,.04) 70.4%,transparent 70.8%),
    linear-gradient(93deg,transparent 82%,rgba(0,0,0,.03) 82.4%,transparent 82.8%);
}
.wall::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 10% 10%, rgba(0,0,0,.35) 0%, transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(0,0,0,.30) 0%, transparent 35%),
    radial-gradient(circle at 10% 90%, rgba(0,0,0,.35) 0%, transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(0,0,0,.30) 0%, transparent 35%);
}

/* Plaster cracks overlay */
.wall-cracks{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  opacity:0.18;
}

/* ══════════════════════════════════════
   FLOOR
══════════════════════════════════════ */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:12%;z-index:5;
  background:linear-gradient(180deg,#100a06 0%,#080402 100%);
  box-shadow:inset 0 6px 22px rgba(0,0,0,.95);
}

/* ══════════════════════════════════════
   CEILING
══════════════════════════════════════ */
.ceiling{
  position:absolute;top:0;left:0;right:0;height:8%;z-index:5;
  background:linear-gradient(180deg,#070404 0%,#0e0a08 100%);
  box-shadow:inset 0 -4px 16px rgba(0,0,0,.8);
}

/* ══════════════════════════════════════
   DOOR FRAME
══════════════════════════════════════ */
.door-frame{
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:44%;height:76%;
  z-index:10;
}

.frame-outer{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#1a1210 0%,#0e0a08 50%,#141010 100%);
  border:6px solid #0a0806;
  box-shadow:
    -8px 0 28px rgba(0,0,0,.85),
    8px 0 28px rgba(0,0,0,.85),
    0 -6px 24px rgba(0,0,0,.8),
    inset 0 0 18px rgba(0,0,0,.6);
}
.frame-outer::before{
  content:'';position:absolute;inset:0;
  border:3px solid rgba(255,255,255,.015);
}
/* Frame bevel inner highlight */
.frame-outer::after{
  content:'';position:absolute;
  inset:6px;
  border:2px solid rgba(60,40,30,.4);
  box-shadow:inset 0 0 24px rgba(0,0,0,.5);
}

/* ══════════════════════════════════════
   DOOR
══════════════════════════════════════ */
.door{
  position:absolute;
  inset:10px;
  background:linear-gradient(170deg,#2a2420 0%,#1e1a16 30%,#161210 60%,#1c1816 100%);
  box-shadow:
    inset 2px 0 8px rgba(255,255,255,.03),
    inset -2px 0 8px rgba(0,0,0,.4),
    inset 0 2px 8px rgba(255,255,255,.025);
  z-index:12;
  overflow:visible;
}
.door.clickable { cursor: pointer; }
.door.unlocked {
  box-shadow:
    inset 0 0 100px rgba(255,160,120,.12),
    inset 0 2px 12px rgba(255,255,255,.05),
    0 0 28px rgba(255,140,90,.08);
}

/* Door panel recesses */
.door::before{
  content:'';position:absolute;
  left:12%;right:12%;top:8%;
  height:36%;
  border:3px solid #0e0a08;
  box-shadow:
    inset 0 2px 10px rgba(0,0,0,.65),
    2px 2px 6px rgba(255,255,255,.02);
  background:linear-gradient(145deg,#181410,#120e0c,#1a1614);
}
.door::after{
  content:'';position:absolute;
  left:12%;right:12%;top:52%;
  height:36%;
  border:3px solid #0e0a08;
  box-shadow:
    inset 0 2px 10px rgba(0,0,0,.65),
    2px 2px 6px rgba(255,255,255,.02);
  background:linear-gradient(145deg,#181410,#120e0c,#1a1614);
}

/* Panel corner ornaments */
.door-panel-top{
  position:absolute;left:12%;right:12%;top:8%;height:36%;
  z-index:13;pointer-events:none;
}
.door-panel-bot{
  position:absolute;left:12%;right:12%;top:52%;height:36%;
  z-index:13;pointer-events:none;
}

/* ══════════════════════════════════════
   DOOR KNOB / LOCK
══════════════════════════════════════ */
.lock-plate{
  position:absolute;
  right:16%;top:47%;
  transform:translateY(-50%);
  width:5%;
  height:22%;
  background:linear-gradient(180deg,#2a2420,#1c1810,#2a2420);
  border:1px solid #0a0808;
  box-shadow:
    inset 1px 0 3px rgba(255,255,255,.04),
    1px 0 6px rgba(0,0,0,.6),
    -1px 0 3px rgba(0,0,0,.4);
  z-index:20;
  border-radius:2px;
}

.knob{
  position:absolute;
  right:calc(16% + 3%);top:47%;
  transform:translateY(-50%);
  width:4.5%;aspect-ratio:1;
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#404040,#1a1a1a,#0e0e0e);
  box-shadow:
    0 2px 10px rgba(0,0,0,.8),
    inset 1px 1px 3px rgba(255,255,255,.08),
    inset -1px -1px 3px rgba(0,0,0,.7);
  z-index:20;
  border:1px solid #0a0a0a;
}

/* ══════════════════════════════════════
   GRAFFITI TEXT
══════════════════════════════════════ */
.graffiti{
  position:absolute;
  left:50%;top:20%;
  transform:translateX(-50%);
  z-index:25;
  text-align:center;
  font-family:'Courier New',monospace;
  font-size:min(1.8vmin,14px);
  font-weight:bold;
  color:rgba(180,60,50,.85);
  text-shadow:0 0 4px rgba(100,20,15,.6);
  letter-spacing:0.08em;
  line-height:1.5;
  width:60%;
  pointer-events:none;
  filter:blur(0.3px);
}

/* ══════════════════════════════════════
   WALL SWITCH / BUTTON
══════════════════════════════════════ */
.switch-box{
  position:absolute;
  right:calc(27.5% - min(900px,100vmin)*0.00);
  z-index:20;
}

/* ══════════════════════════════════════
   CHAINS – drawn with SVG on a canvas layer
══════════════════════════════════════ */
.chains-layer{
  position:absolute;inset:0;z-index:30;pointer-events:none;
  overflow:visible;
}

/* ══════════════════════════════════════
   VIGNETTE + PARTICLES
══════════════════════════════════════ */
.vignette{
  position:absolute;inset:0;z-index:46;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 22%,rgba(0,0,0,.82) 100%);
}
#particles{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:47;pointer-events:none;
}

.page-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:62px;
  height:124px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:12px 8px;
  background:rgba(16,8,6,.62);
  border:1px solid rgba(255,80,80,.24);
  border-radius:28px;
  color:#ffc2c2;
  text-decoration:none;
  font-family:system-ui, sans-serif;
  font-size:0.76rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-align:center;
  backdrop-filter:blur(8px);
  z-index:210;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}

.page-nav:hover{
  transform:translateY(-50%) scale(1.04);
  box-shadow:0 0 30px rgba(255,80,80,.28);
  border-color:rgba(255,120,120,.5);
}

.page-nav-left{
  left:18px;
}

.page-nav-right{
  right:18px;
}

.page-nav-icon{
  font-size:1.5rem;
  line-height:1;
}

/* Ambient glow behind door */
.door-glow{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-52%);
  width:52%;height:82%;
  z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,rgba(30,20,10,.0) 0%,transparent 100%);
  filter:blur(8px);
}

/* Crack lines on wall SVG */
.wall-svg{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  width:100%;height:100%;
}

/* Dust motes */
@keyframes float1{ 0%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(3px,-8px) rotate(8deg)} 100%{transform:translate(0,0) rotate(0deg)} }
@keyframes float2{ 0%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(-4px,-6px) rotate(-6deg)} 100%{transform:translate(0,0) rotate(0deg)} }
@keyframes float3{ 0%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(2px,-10px) rotate(4deg)} 100%{transform:translate(0,0) rotate(0deg)} }

/* Chain shimmer */
@keyframes chainShimmer{
  0%,100%{opacity:1}
  48%{opacity:.92}
  50%{opacity:.96}
  52%{opacity:.92}
}
</style>
</head>
<body>
<div class="scene" id="scene">

  <!-- WALL -->
  <div class="wall"></div>

  <!-- Wall cracks SVG -->
  <svg class="wall-svg" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Plaster cracks -->
    <g stroke="#3a2e28" stroke-linecap="round" fill="none" opacity=".13">
      <path d="M80 120 Q96 135 88 158 Q102 172 95 190" stroke-width="1.2"/>
      <path d="M88 158 Q75 165 72 180" stroke-width=".7"/>
      <path d="M820 80 Q808 100 815 125 Q805 140 812 165" stroke-width="1"/>
      <path d="M815 125 Q826 132 830 148" stroke-width=".6"/>
      <path d="M60 700 Q75 718 68 738 Q80 752 74 775" stroke-width="1.1"/>
      <path d="M840 680 Q825 700 832 722 Q820 740 828 762" stroke-width=".9"/>
      <path d="M68 738 Q58 745 55 760" stroke-width=".5"/>
      <path d="M150 820 Q165 808 172 820 Q185 814 190 828" stroke-width=".8"/>
      <path d="M740 840 Q755 828 762 840 Q775 834 780 848" stroke-width=".8"/>
      <!-- horizontal stress lines -->
      <path d="M40 340 Q80 336 95 345 Q120 341 140 348" stroke-width=".6" opacity=".6"/>
      <path d="M760 280 Q800 275 818 284 Q845 279 865 286" stroke-width=".6" opacity=".6"/>
    </g>

    <!-- Subtle wall texture stipple -->
    <g fill="#2a2220" opacity=".07">
      <circle cx="120" cy="200" r="1.5"/><circle cx="240" cy="150" r="1"/><circle cx="80" cy="400" r="1.2"/>
      <circle cx="820" cy="220" r="1.5"/><circle cx="760" cy="380" r="1"/><circle cx="840" cy="500" r="1.2"/>
      <circle cx="180" cy="680" r="1"/><circle cx="780" cy="640" r="1.5"/><circle cx="100" cy="580" r="1"/>
    </g>

    <!-- Floor-wall seam crack -->
    <path d="M0 792 Q150 788 250 793 Q350 789 450 792 Q550 790 650 794 Q750 790 850 793 Q900 791 900 792"
          stroke="#1a1412" stroke-width="1.5" fill="none" opacity=".4"/>
    <!-- Ceiling-wall seam -->
    <path d="M0 72 Q200 68 350 73 Q500 69 650 72 Q800 68 900 72"
          stroke="#1a1412" stroke-width="1" fill="none" opacity=".3"/>
  </svg>

  <!-- Door ambient glow -->
  <div class="door-glow"></div>

  <!-- FLOOR -->
  <div class="floor"></div>

  <!-- CEILING -->
  <div class="ceiling"></div>

  <!-- ══ DOOR FRAME + DOOR ══ -->
  <div class="door-frame" id="doorFrame">
    <div class="frame-outer"></div>
    <div class="door" id="door">
      <!-- Top panel corners detail -->
      <div class="door-panel-top">
        <svg width="100%" height="100%" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <!-- Corner ornaments -->
          <rect x="0" y="0" width="220" height="220" fill="none" stroke="rgba(255,255,255,.025)" stroke-width="2"/>
          <line x1="0" y1="0" x2="18" y2="0" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="0" x2="0" y2="18" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="0" x2="202" y2="0" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="0" x2="220" y2="18" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="220" x2="18" y2="220" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="220" x2="0" y2="202" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="220" x2="202" y2="220" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="220" x2="220" y2="202" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <!-- Inset shadow -->
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="rgba(0,0,0,.5)" stroke-width="1"/>
        </svg>
      </div>
      <div class="door-panel-bot">
        <svg width="100%" height="100%" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <rect x="0" y="0" width="220" height="220" fill="none" stroke="rgba(255,255,255,.025)" stroke-width="2"/>
          <line x1="0" y1="0" x2="18" y2="0" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="0" x2="0" y2="18" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="0" x2="202" y2="0" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="0" x2="220" y2="18" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="220" x2="18" y2="220" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="0" y1="220" x2="0" y2="202" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="220" x2="202" y2="220" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <line x1="220" y1="220" x2="220" y2="202" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="rgba(0,0,0,.5)" stroke-width="1"/>
        </svg>
      </div>

      <!-- Door wood grain texture -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:13;pointer-events:none;" viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <g stroke="rgba(0,0,0,.06)" stroke-width=".8" fill="none">
          <path d="M0 80 Q200 74 400 80"/>
          <path d="M0 165 Q200 160 400 165"/>
          <path d="M0 250 Q200 246 400 250"/>
          <path d="M0 335 Q200 330 400 335"/>
          <path d="M0 420 Q200 416 400 420"/>
          <path d="M0 505 Q200 500 400 505"/>
          <path d="M0 590 Q200 585 400 590"/>
        </g>
        <!-- subtle vertical grain -->
        <g stroke="rgba(255,255,255,.012)" stroke-width=".5" fill="none">
          <line x1="60" y1="0" x2="58" y2="700"/>
          <line x1="140" y1="0" x2="142" y2="700"/>
          <line x1="220" y1="0" x2="218" y2="700"/>
          <line x1="300" y1="0" x2="302" y2="700"/>
          <line x1="360" y1="0" x2="358" y2="700"/>
        </g>
      </svg>
    </div>

    <!-- LOCK PLATE -->
    <div class="lock-plate"></div>
    <!-- DOOR KNOB -->
    <div class="knob"></div>

    <!-- GRAFFITI TEXT -->
    <div class="graffiti" id="graffiti">Don't go there !<br><span style="font-size:0.85em;opacity:.7">maybe</span></div>

    <!-- WALL SWITCH / PLATE right of door -->
    <div style="position:absolute;left:110%;top:48%;transform:translateY(-50%);z-index:20;width:min(24px,2.8vmin);height:min(40px,4.5vmin);">
      <div style="width:100%;height:100%;background:linear-gradient(180deg,#2a2420,#1c1810);border:1px solid #0c0a08;border-radius:2px;box-shadow:1px 1px 4px rgba(0,0,0,.7),inset 0 0 4px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;">
        <div style="width:40%;height:40%;background:#161210;border-radius:1px;box-shadow:inset 0 1px 2px rgba(0,0,0,.8)"></div>
      </div>
    </div>
  </div>

  <!-- ══ CHAINS SVG LAYER ══ -->
  <svg id="chainsSvg" class="chains-layer" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Chain link gradient - dark gray metallic -->
      <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#5a5a5a"/>
        <stop offset="28%" stop-color="#3d3d3d"/>
        <stop offset="50%" stop-color="#282828"/>
        <stop offset="72%" stop-color="#363636"/>
        <stop offset="100%" stop-color="#4a4a4a"/>
      </linearGradient>
      <linearGradient id="lg2" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"  stop-color="#525252"/>
        <stop offset="30%" stop-color="#383838"/>
        <stop offset="55%" stop-color="#242424"/>
        <stop offset="80%" stop-color="#333333"/>
        <stop offset="100%" stop-color="#464646"/>
      </linearGradient>
      <linearGradient id="lg3" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"  stop-color="#4e4e4e"/>
        <stop offset="35%" stop-color="#303030"/>
        <stop offset="60%" stop-color="#1e1e1e"/>
        <stop offset="100%" stop-color="#424242"/>
      </linearGradient>
      <linearGradient id="lgH" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"  stop-color="#545454"/>
        <stop offset="25%" stop-color="#3a3a3a"/>
        <stop offset="50%" stop-color="#252525"/>
        <stop offset="75%" stop-color="#323232"/>
        <stop offset="100%" stop-color="#484848"/>
      </linearGradient>
      <linearGradient id="lgV" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"  stop-color="#505050"/>
        <stop offset="25%" stop-color="#363636"/>
        <stop offset="50%" stop-color="#222222"/>
        <stop offset="75%" stop-color="#2e2e2e"/>
        <stop offset="100%" stop-color="#444444"/>
      </linearGradient>
      <!-- Highlight for top edge of links -->
      <linearGradient id="lgHL" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"  stop-color="#686868" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#2a2a2a" stop-opacity="0"/>
      </linearGradient>
      <!-- Rust/age spots filter -->
      <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="2"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feComposite in="SourceGraphic" in2="grayNoise" operator="arithmetic" k1="0" k2="0.92" k3="0.08" k4="0"/>
      </filter>
      <!-- Shadow for chains -->
      <filter id="chainShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,.8)"/>
      </filter>
      <filter id="chainShadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="-3" dy="5" stdDeviation="4" flood-color="rgba(0,0,0,.75)"/>
      </filter>
      <filter id="chainShadow3" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,.85)"/>
      </filter>
      <!-- Lock body gradient -->
      <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#4a4a4a"/>
        <stop offset="40%" stop-color="#2a2a2a"/>
        <stop offset="100%" stop-color="#1a1a1a"/>
      </linearGradient>
      <linearGradient id="lockShackle" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"  stop-color="#525252"/>
        <stop offset="50%" stop-color="#2e2e2e"/>
        <stop offset="100%" stop-color="#484848"/>
      </linearGradient>
      <!-- Padlock outer glow filter (soft colored aura) -->
      <filter id="padlockGlow" x="-60%" y="-60%" width="340%" height="340%" primitiveUnits="userSpaceOnUse">
        <!-- blur the alpha to produce soft halo -->
        <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
        <!-- flood with desired color -->
        <feFlood flood-color="#ff4a4a" flood-opacity="0.85" result="flood"/>
        <!-- keep flood only where blur exists -->
        <feComposite in="flood" in2="blur" operator="in" result="glow"/>
        <!-- slightly blur the colored glow for smoothness -->
        <feGaussianBlur in="glow" stdDeviation="6" result="glow2"/>
        <feMerge>
          <feMergeNode in="glow2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <!-- Chain groups will be injected by JS -->
  </svg>

  <!-- ══ VIGNETTE ══ -->
  <div class="vignette"></div>

<script>
// ─────────────────────────────────────
//  CHAIN LINK DRAWING UTILITIES
// ─────────────────────────────────────
const svg = document.getElementById('chainsSvg');
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs){
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

// Draw a single oval chain link at (cx,cy), rotated by angleDeg
// lw = link width (short axis), ll = link length (long axis), thickness = bar thickness
function drawLink(parent, cx, cy, angleDeg, ll, lw, thick, gradId, shadowId){
  const g = el('g', {
    transform: `rotate(${angleDeg} ${cx} ${cy})`,
    class: 'door-chain',
    filter: shadowId ? `url(#${shadowId})` : ''
  });

  // outer ellipse (the link body - ring shape)
  // Drawn as two paths: outer rect-ish ellipse minus inner
  // Use two stacked ellipses for the ring effect

  // Outer body
  const outerRx = ll/2;
  const outerRy = lw/2;
  const innerRx = ll/2 - thick;
  const innerRy = lw/2 - thick;

  // Filled ring: clip with inner ellipse
  // Use a path with outer + inner ellipse (even-odd)
  const id = 'clip_' + Math.random().toString(36).slice(2,8);

  const clipPath = el('clipPath', {id});
  // outer rect that covers the link
  const clipRect = el('rect', {
    x: cx - outerRx - 2,
    y: cy - outerRy - 2,
    width: (outerRx + 2) * 2,
    height: (outerRy + 2) * 2
  });
  clipPath.appendChild(clipRect);

  // Main link body (outer ellipse)
  const body = el('ellipse', {
    cx, cy,
    rx: outerRx, ry: outerRy,
    fill: `url(#${gradId})`,
    stroke: '#181818',
    'stroke-width': '0.8'
  });

  // Inner hole (dark)
  const hole = el('ellipse', {
    cx, cy,
    rx: Math.max(1, innerRx), ry: Math.max(1, innerRy),
    fill: '#0c0c0c',
    stroke: '#222',
    'stroke-width': '0.6'
  });

  // Top highlight sliver
  const hl = el('ellipse', {
    cx, cy: cy - outerRy * 0.62,
    rx: outerRx * 0.78, ry: outerRy * 0.22,
    fill: 'url(#lgHL)',
    opacity: '0.45'
  });

  // Inner edge shadow (makes it look 3D)
  const innerShadow = el('ellipse', {
    cx, cy: cy + 1.5,
    rx: Math.max(1, innerRx + 1), ry: Math.max(1, innerRy + 1),
    fill: 'none',
    stroke: 'rgba(0,0,0,.6)',
    'stroke-width': '2.5'
  });

  g.appendChild(body);
  g.appendChild(hole);
  g.appendChild(innerShadow);
  g.appendChild(hl);
  parent.appendChild(g);
}

// Draw a series of chain links along a path defined by control points
// Alternates horizontal/vertical links for interlocked look
function drawChain(parent, points, ll, lw, thick, gradIds, shadowId, spacing){
  // interpolate points along a bezier/polyline
  const totalLen = pathLength(points);
  const step = ll * spacing; // overlap factor
  let dist = 0;
  let linkIdx = 0;
  const positions = [];

  while(dist <= totalLen){
    const t = dist / totalLen;
    const [x, y] = samplePath(points, t);
    const [dx, dy] = pathTangent(points, t);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    positions.push({x, y, angle, i: linkIdx});
    dist += step;
    linkIdx++;
  }

  positions.forEach(({x, y, angle, i}) => {
    // alternate perpendicular links
    const a = (i % 2 === 0) ? angle : angle + 90;
    const gId = gradIds[i % gradIds.length];
    drawLink(parent, x, y, a, ll, lw, thick, gId, i % 3 === 0 ? shadowId : null);
  });
}

function pathLength(pts){
  let l = 0;
  for(let i=0;i<pts.length-1;i++){
    const dx=pts[i+1][0]-pts[i][0], dy=pts[i+1][1]-pts[i][1];
    l+=Math.sqrt(dx*dx+dy*dy);
  }
  return l;
}

function samplePath(pts, t){
  const total = pathLength(pts);
  let target = t * total;
  let acc = 0;
  for(let i=0;i<pts.length-1;i++){
    const dx=pts[i+1][0]-pts[i][0], dy=pts[i+1][1]-pts[i][1];
    const seg=Math.sqrt(dx*dx+dy*dy);
    if(acc+seg>=target){
      const lt=(target-acc)/seg;
      return [pts[i][0]+dx*lt, pts[i][1]+dy*lt];
    }
    acc+=seg;
  }
  return pts[pts.length-1];
}

function pathTangent(pts, t){
  const total = pathLength(pts);
  let target = t * total;
  let acc = 0;
  for(let i=0;i<pts.length-1;i++){
    const dx=pts[i+1][0]-pts[i][0], dy=pts[i+1][1]-pts[i][1];
    const seg=Math.sqrt(dx*dx+dy*dy);
    if(acc+seg>=target){
      return [dx/seg, dy/seg];
    }
    acc+=seg;
  }
  const last=pts.length-1;
  const dx=pts[last][0]-pts[last-1][0], dy=pts[last][1]-pts[last-1][1];
  const m=Math.sqrt(dx*dx+dy*dy);
  return [dx/m, dy/m];
}

// ─────────────────────────────────────
//  DRAW ALL CHAIN GROUPS
// ─────────────────────────────────────
// Scene is 900x900 viewBox
// Door frame center ~450,450 width~396 height~684
// Door frame: left~252, right~648, top~108, bottom~792
// Adjusted to visible door frame area

const doorL = 252, doorR = 648, doorT = 120, doorB = 790;
const doorCX = 450, doorCY = 455;

const grads = ['lg1','lg2','lg3','lgH','lgV'];

// Link size parameters — thick heavy chains, clearly visible
const LL = 28;  // link long axis
const LW = 16;  // link short axis
const TK = 5;   // wall thickness of link
const SP = 0.72; // spacing factor (overlap)

// ── CHAIN 1: diagonal top-left to bottom-right ──
// From top-left corner of door down across to bottom-right
{
  const g = el('g', {filter:'url(#chainShadow)'});
  const pts = [
    [doorL - 30, doorT - 40],
    [doorL + 60, doorT + 90],
    [doorCX - 60, doorCY - 30],
    [doorCX + 80, doorCY + 100],
    [doorR - 40, doorB - 80],
    [doorR + 20, doorB + 30]
  ];
  drawChain(g, pts, LL, LW, TK, ['lg1','lgH','lg2'], 'chainShadow', SP);
  svg.appendChild(g);
}

// ── CHAIN 2: diagonal top-right to bottom-left ──
{
  const g = el('g', {filter:'url(#chainShadow2)'});
  const pts = [
    [doorR + 28, doorT - 35],
    [doorR - 55, doorT + 100],
    [doorCX + 30, doorCY - 50],
    [doorCX - 70, doorCY + 80],
    [doorL + 50, doorB - 60],
    [doorL - 22, doorB + 25]
  ];
  drawChain(g, pts, LL, LW, TK, ['lg2','lgV','lg3'], 'chainShadow2', SP);
  svg.appendChild(g);
}

// ── CHAIN 3: near-vertical left side ──
{
  const g = el('g', {filter:'url(#chainShadow3)'});
  const pts = [
    [doorL + 20, doorT - 20],
    [doorL - 10, doorT + 150],
    [doorL + 15, doorCY - 60],
    [doorL - 5,  doorCY + 120],
    [doorL + 10, doorB + 15]
  ];
  drawChain(g, pts, LL, LW, TK, ['lgV','lg1','lgH'], 'chainShadow3', SP);
  svg.appendChild(g);
}

// ── CHAIN 4: near-vertical right side ──
{
  const g = el('g', {filter:'url(#chainShadow)'});
  const pts = [
    [doorR - 15, doorT - 25],
    [doorR + 8,  doorT + 140],
    [doorR - 10, doorCY - 40],
    [doorR + 5,  doorCY + 130],
    [doorR - 8,  doorB + 20]
  ];
  drawChain(g, pts, LL, LW, TK, ['lg3','lgH','lg2'], 'chainShadow', SP);
  svg.appendChild(g);
}

// ── CHAIN 5: wide diagonal top-right to bottom-left crossing ──
{
  const g = el('g', {});
  const pts = [
    [doorR - 10, doorT + 40],
    [doorCX + 50, doorCY - 100],
    [doorCX - 80, doorCY + 60],
    [doorL + 30,  doorB - 100],
    [doorL - 10,  doorB - 10]
  ];
  drawChain(g, pts, LW + 2, LW - 2, TK - 1, ['lg1','lg3','lgV'], 'chainShadow2', SP - 0.02);
  svg.appendChild(g);
}

// ── CHAIN 6: short horizontal brace across middle ──
{
  const g = el('g', {filter:'url(#chainShadow3)'});
  const pts = [
    [doorL - 18, doorCY + 20],
    [doorL + 80, doorCY - 10],
    [doorCX,     doorCY + 15],
    [doorR - 70, doorCY - 5],
    [doorR + 16, doorCY + 25]
  ];
  drawChain(g, pts, LW + 4, LW, TK, ['lgH','lg2','lg1'], 'chainShadow', SP + 0.05);
  svg.appendChild(g);
}

// ── CHAIN 7: extra diagonal reinforcement ──
{
  const g = el('g', {}); 
  const pts = [
    [doorL + 40,  doorT + 10],
    [doorCX - 30, doorCY - 80],
    [doorCX + 60, doorCY + 60],
    [doorR - 30,  doorB - 40]
  ];
  drawChain(g, pts, LW, LW - 3, TK - 1, ['lg3','lg1','lgV'], null, SP);
  svg.appendChild(g);
}

// ─────────────────────────────────────
//  PADLOCKS
// ─────────────────────────────────────
function drawPadlock(parent, cx, cy, scale, name){
  const s = scale || 1;
  const gid = name ? `padlock-${name}` : `padlock-${Math.random().toString(36).slice(2,8)}`;
  const g = el('g', {id: gid, transform:`translate(${cx},${cy}) scale(${s})`});

  // Lock body
  const body = el('rect', {
    x:-22, y:-8, width:44, height:36, rx:4,
    fill:'url(#lockGrad)',
    stroke:'#111',
    'stroke-width':'1.5'
  });
  // Shackle (U-bar)
  const shackle = el('path', {
    d:'M-12 -8 L-12 -26 Q-12 -38 0 -38 Q12 -38 12 -26 L12 -8',
    fill:'none',
    stroke:'url(#lockShackle)',
    'stroke-width':'7',
    'stroke-linecap':'round'
  });
  const shackleHL = el('path', {
    d:'M-12 -8 L-12 -26 Q-12 -38 0 -38 Q12 -38 12 -26 L12 -8',
    fill:'none',
    stroke:'rgba(100,100,100,.5)',
    'stroke-width':'3',
    'stroke-linecap':'round'
  });
  // Keyhole
  const hole = el('circle', {cx:0, cy:12, r:7, fill:'#0a0a0a', stroke:'#1a1a1a', 'stroke-width':'1'});
  const slot = el('rect', {x:-3, y:12, width:6, height:10, rx:1, fill:'#0a0a0a'});
  // Body highlight
  const bodyHL = el('rect', {
    x:-20, y:-6, width:40, height:8, rx:2,
    fill:'rgba(100,100,100,.18)'
  });
  // Highlight elements (initially hidden)
  const hlBack = el('ellipse', {
    cx:0, cy:8, rx:28, ry:22,
    fill:'rgba(255,64,64,0.06)',
    opacity: '0', 'pointer-events': 'none'
  });
  const hlRing = el('ellipse', {
    cx:0, cy:8, rx:22, ry:18,
    fill:'none', stroke:'rgba(255,80,80,0.42)', 'stroke-width':'2', opacity:'0', 'pointer-events':'none'
  });
  // Outer glow (initially hidden) - will use SVG filter for soft edge glow
  const outerGlow = el('ellipse', {
    cx:0, cy:8, rx:40, ry:32,
    fill:'#ffffff',
    opacity:'0'
  });
  outerGlow.setAttribute('filter','url(#padlockGlow)');

  // Append elements (no shadow)
  g.appendChild(outerGlow);
  g.appendChild(hlBack);
  g.appendChild(hlRing);
  g.appendChild(shackle);
  g.appendChild(shackleHL);
  g.appendChild(body);
  g.appendChild(bodyHL);
  g.appendChild(hole);
  g.appendChild(slot);

  // Insert padlock before the first chain group so it's one layer lower.
  const firstChain = parent.querySelector('g[filter]');
  if (firstChain) parent.insertBefore(g, firstChain);
  else parent.appendChild(g);

  // Create a larger invisible overlay area that captures hover events reliably
  const overlayW = 120, overlayH = 110;
  const overlay = el('rect', {
    x: cx - overlayW/2,
    y: cy - overlayH/2,
    width: overlayW,
    height: overlayH,
    fill: 'rgba(0,0,0,0)',
    stroke: 'none'
  });
  // Make overlay receive pointer events and show pointer cursor
  overlay.style.pointerEvents = 'all';
  overlay.style.cursor = 'pointer';
  overlay.setAttribute('class', 'padlock-overlay');

  // Append overlay after chains so it's on top for interaction but transparent visually
  parent.appendChild(overlay);

  // Hover interactions wired to overlay: bring padlock to top, show highlight, scale
  const baseTransform = `translate(${cx},${cy}) scale(${s})`;
  const hoverTransform = `translate(${cx},${cy}) scale(${(s * 1.06).toFixed(4)})`;

  // ensure transform origin
  try { g.style.transformBox = 'fill-box'; g.style.transformOrigin = 'center'; } catch (e) {}

  let hoverAnim = null;
  overlay.addEventListener('mouseenter', () => {
    try { parent.appendChild(g); } catch (e) {}
    if (hoverAnim) hoverAnim.cancel();
    hoverAnim = g.animate([
      { transform: baseTransform },
      { transform: hoverTransform }
    ], { duration: 220, fill: 'forwards', easing: 'cubic-bezier(.2,.8,.2,1)' });
    outerGlow.animate([{opacity:0},{opacity:0.9}], {duration:260, fill:'forwards', easing:'cubic-bezier(.2,.8,.2,1)'});
    hlBack.animate([{opacity:0},{opacity:0.22}], {duration:220, fill:'forwards'});
    hlRing.animate([{opacity:0},{opacity:1}], {duration:220, fill:'forwards'});
  });

  overlay.addEventListener('mouseleave', () => {
    if (hoverAnim) hoverAnim.cancel();
    g.animate([
      { transform: hoverTransform },
      { transform: baseTransform }
    ], { duration: 180, fill: 'forwards', easing: 'cubic-bezier(.2,.8,.2,1)' });
    outerGlow.animate([{opacity:0.9},{opacity:0}], {duration:200, fill:'forwards', easing:'cubic-bezier(.2,.8,.2,1)'});
    hlBack.animate([{opacity:0.22},{opacity:0}], {duration:180, fill:'forwards'});
    hlRing.animate([{opacity:1},{opacity:0}], {duration:180, fill:'forwards'});
    // Return padlock to original layer (before firstChain)
    if (firstChain && firstChain.parentNode === parent) parent.insertBefore(g, firstChain);
    else try { parent.appendChild(g); } catch (e) {}
  });

  overlay.addEventListener('click', () => {
    if (doorUnlocked) {
      return;
    }

    const keyCount = parseInt(localStorage.getItem('typewriter-inventory') || '0', 10);
    if (keyCount > 0) {
      unlockDoor();
    } else {
      alert('First, you need to find the key in the office to unlock the padlock.');
    }
  });
}

// Central padlock on door
  drawPadlock(svg, 450, 500, 1.6, 'central');
// Only keep the central padlock

const doorEl = document.getElementById('door');
let doorUnlocked = localStorage.getItem('door-unlocked') === '1';

function applyUnlockedDoorState() {
  if (doorEl) {
    doorEl.classList.add('unlocked', 'clickable');
  }

  const chains = svg.querySelectorAll('g.door-chain');
  chains.forEach((chain, index) => {
    chain.style.transition = 'opacity .45s ease, transform .45s ease';
    chain.style.opacity = '0';
    chain.style.transform = 'translateY(22px)';
    setTimeout(() => {
      if (chain.parentNode) chain.parentNode.removeChild(chain);
    }, 480 + index * 20);
  });

  const padlock = svg.querySelector('#padlock-central');
  if (padlock) {
    padlock.style.transition = 'opacity .3s ease';
    padlock.style.opacity = '0';
  }
  const overlay = svg.querySelector('.padlock-overlay');
  if (overlay) {
    overlay.style.display = 'none';
  }
}

function unlockDoor() {
  if (doorUnlocked) return;
  doorUnlocked = true;
  localStorage.setItem('door-unlocked', '1');
  applyUnlockedDoorState();
}

if (doorEl) {
  doorEl.addEventListener('click', () => {
    if (doorUnlocked) {
      window.location.href = '../index.html';
    } else {
      alert('First, you need to find the key in the office to unlock the padlock.');
    }
  });
}

if (doorUnlocked) {
  applyUnlockedDoorState();
}

// ─────────────────────────────────────
//  WALL ANCHOR BOLTS (where chains attach to wall)
// ─────────────────────────────────────
function drawBolt(parent, cx, cy, r){
  r = r || 9;
  const g = el('g', {});
  const outer = el('circle', {cx, cy, r, fill:'#1e1e1e', stroke:'#0a0a0a', 'stroke-width':'1.5'});
  const mid   = el('circle', {cx, cy, r:r*0.65, fill:'#2a2a2a'});
  const inner = el('circle', {cx, cy, r:r*0.3, fill:'#111'});
  const hl    = el('circle', {cx:cx-r*0.25, cy:cy-r*0.25, r:r*0.2, fill:'rgba(80,80,80,.4)'});
  g.appendChild(outer); g.appendChild(mid); g.appendChild(inner); g.appendChild(hl);
  parent.appendChild(g);
}

// Bolts at chain attachment points
drawBolt(svg, doorL - 28, doorT - 38, 11);
drawBolt(svg, doorR + 26, doorT - 33, 11);
drawBolt(svg, doorL - 20, doorB + 28, 10);
drawBolt(svg, doorR + 18, doorB + 28, 10);
drawBolt(svg, doorL - 8,  doorCY + 22, 9);
drawBolt(svg, doorR + 14, doorCY + 25, 9);
drawBolt(svg, doorL + 22, doorT + 12, 8);
drawBolt(svg, doorR - 12, doorT + 42, 8);

// ─────────────────────────────────────
//  DUST PARTICLE SYSTEM
// ─────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
const scene  = document.getElementById('scene');

let W, H;
function resize(){
  W = canvas.width  = scene.offsetWidth;
  H = canvas.height = scene.offsetHeight;
}
resize();
new ResizeObserver(resize).observe(scene);

const pts = Array.from({length:70}, (_, i) => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - .5) * .15,
  vy: -(Math.random() * .18 + .04),
  r: Math.random() * 1.2 + .2,
  a: Math.random() * .18 + .03,
  ph: Math.random() * Math.PI * 2,
  sp: Math.random() * .003 + .001,
}));

function tick(){
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x  += p.vx + Math.sin(p.ph) * .08;
    p.y  += p.vy;
    p.ph += p.sp;
    if(p.y < -3){ p.y = H * .95; p.x = Math.random() * W; }
    if(p.x < 0 || p.x > W) p.vx *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,160,130,${p.a})`;
    ctx.fill();
  });
  requestAnimationFrame(tick);
}
tick();

// ─────────────────────────────────────
//  GRAFFITI font flicker (subtle)

const graffiti = document.getElementById('graffiti');
setInterval(() => {
  const opa = (0.75 + Math.random() * 0.2).toFixed(2);
  graffiti.style.opacity = opa;
}, 2800 + Math.random() * 1200);

</script>
