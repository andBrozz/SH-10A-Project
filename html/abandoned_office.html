<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abandoned Office</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#020100;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.scene{
  position:relative;
  width:min(900px,100vmin);
  height:min(900px,100vmin);
  background:#0c0804;
  overflow:hidden;
  box-shadow:0 0 120px rgba(0,0,0,1);
}

/* ══════════════════════════════════════
   WALL
══════════════════════════════════════ */
.wall{
  position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 58% 68% at 32% 44%, #221608 0%, #160f05 42%, #0c0803 100%);
}
/* cracked plaster texture */
.wall::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(92deg,transparent 34%,rgba(0,0,0,.05) 34.3%,transparent 34.6%),
    linear-gradient(185deg,transparent 55%,rgba(0,0,0,.04) 55.4%,transparent 55.8%),
    linear-gradient(87deg,transparent 62%,rgba(0,0,0,.03) 62.3%,transparent 62.7%),
    linear-gradient(178deg,transparent 28%,rgba(0,0,0,.04) 28.4%,transparent 28.8%),
    linear-gradient(96deg,transparent 78%,rgba(0,0,0,.04) 78.4%,transparent 78.8%);
}
.wall::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 65% 30%, rgba(0,0,0,.2) 0%, transparent 30%),
    radial-gradient(circle at 80% 75%, rgba(0,0,0,.25) 0%, transparent 25%);
}

/* ══════════════════════════════════════
   WINDOW AMBIENT GLOW
══════════════════════════════════════ */
.win-glow{
  position:absolute;left:-10%;top:-8%;
  width:82%;height:108%;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse 42% 58% at 40% 50%,
      rgba(252,192,42,.32) 0%,
      rgba(224,142,22,.16) 35%,
      rgba(172,88,10,.07) 60%,
      transparent 78%
    );
}

/* ══════════════════════════════════════
   LIGHT RAYS
══════════════════════════════════════ */
.rays{
  position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;
}
.ray{
  position:absolute;top:0;height:100%;
  background:linear-gradient(180deg,transparent 0%,rgba(255,195,68,.055) 45%,transparent 100%);
  transform-origin:30% 38%;
  filter:blur(4px);
}

/* ══════════════════════════════════════
   WINDOW ASSEMBLY
══════════════════════════════════════ */
.win{
  position:absolute;
  left:11%;top:1.5%;
  width:33%;height:80%;
  z-index:10;
}

.win-light{
  position:absolute;inset:11px;
  background:radial-gradient(ellipse at 50% 65%,
    #ffe884 0%,#f5c030 22%,#e8a020 52%,#d08015 78%,#b86010 100%
  );
  overflow:hidden;
}

/* Light shimmer animation */
.win-light::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 45% 60%,rgba(255,255,220,.15) 0%,transparent 60%);
  animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{
  0%,100%{opacity:1}
  50%{opacity:.7}
}

.win-frame{
  position:absolute;inset:0;
  border:11px solid #2c1c0a;
  box-shadow:
    inset 0 0 0 2px #190e06,
    6px 0 22px rgba(0,0,0,.75),
    -3px 0 12px rgba(0,0,0,.5);
  z-index:12;pointer-events:none;
}
/* Inner frame bevel */
.win-frame::before{
  content:'';position:absolute;inset:0;
  border:3px solid rgba(255,255,255,.04);
}

/* Pane cross dividers */
.win-cross{
  position:absolute;inset:0;z-index:14;pointer-events:none;
}
.win-cross::before{
  content:'';position:absolute;
  left:calc(50% - 3px);top:11px;bottom:11px;width:6px;
  background:#2c1c0a;
  box-shadow:0 0 3px rgba(0,0,0,.6);
}
.win-cross::after{
  content:'';position:absolute;
  top:calc(44% - 3px);left:11px;right:11px;height:6px;
  background:#2c1c0a;
  box-shadow:0 0 3px rgba(0,0,0,.6);
}

/* Glass grime */
.win-grime{
  position:absolute;inset:0;z-index:13;pointer-events:none;
  background:
    radial-gradient(circle at 22% 28%,rgba(110,68,8,.4) 0%,transparent 28%),
    radial-gradient(circle at 76% 18%,rgba(85,52,4,.28) 0%,transparent 22%),
    radial-gradient(circle at 12% 80%,rgba(95,58,5,.3) 0%,transparent 24%),
    radial-gradient(circle at 68% 72%,rgba(72,46,3,.22) 0%,transparent 20%),
    radial-gradient(circle at 50% 45%,rgba(60,38,2,.12) 0%,transparent 35%);
}

/* ══════════════════════════════════════
   BLINDS
══════════════════════════════════════ */
.blinds{
  position:absolute;inset:11px;
  height:calc(36%);
  overflow:hidden;z-index:15;pointer-events:none;
}
.slat{
  position:absolute;
  height:9px;
  background:linear-gradient(180deg,#604228 0%,#3e2814 55%,#2a1a08 100%);
  box-shadow:0 2px 3px rgba(0,0,0,.65),0 -1px 0 rgba(255,175,50,.08);
}

/* ══════════════════════════════════════
   PLANTS (placed inside win-light)
══════════════════════════════════════ */
.plants{
  position:absolute;bottom:0;left:0;right:0;
  height:57%;z-index:16;pointer-events:none;
}

/* ══════════════════════════════════════
   WINDOWSILL
══════════════════════════════════════ */
.sill{
  position:absolute;
  bottom:-10px;left:-18px;right:-18px;height:20px;
  background:linear-gradient(180deg,#5e3a20,#3c2512);
  border-top:2px solid #7e5232;
  box-shadow:0 5px 15px rgba(0,0,0,.72),0 -2px 8px rgba(245,180,42,.14);
  z-index:18;
}

/* ══════════════════════════════════════
   FLOOR
══════════════════════════════════════ */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:9%;z-index:5;
  background:linear-gradient(180deg,#160d04 0%,#0c0702 100%);
  box-shadow:inset 0 6px 22px rgba(0,0,0,.85);
}

/* floor window light patch */
.floor-light{
  position:absolute;
  left:8%;bottom:0;
  width:40%;height:100%;
  background:radial-gradient(ellipse at 30% 0%,
    rgba(220,155,30,.12) 0%,transparent 70%
  );
  pointer-events:none;
  z-index:6;
}

/* ══════════════════════════════════════
   BULLETIN BOARD
══════════════════════════════════════ */
.board{
  position:absolute;
  right:1%;top:26%;
  width:44%;height:46%;z-index:8;
}
.board-bg{
  position:absolute;inset:0;
  background:linear-gradient(148deg,#9a7218 0%,#7a5a12 35%,#6a4e0f 65%,#8a6515 100%);
  border:9px solid #2c1e0a;
  box-shadow:
    inset 0 0 24px rgba(0,0,0,.55),
    0 6px 28px rgba(0,0,0,.72),
    -6px 0 16px rgba(0,0,0,.55);
  overflow:hidden;
}
.board-bg::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 13px,rgba(0,0,0,.038) 14px),
    radial-gradient(circle at 20% 16%,rgba(255,255,255,.058) 0%,transparent 32%),
    radial-gradient(circle at 75% 80%,rgba(0,0,0,.12) 0%,transparent 30%);
}
/* board shadow on wall below it */
.board::after{
  content:'';position:absolute;
  bottom:-15px;left:5%;right:5%;height:15px;
  background:rgba(0,0,0,.35);
  filter:blur(8px);
}

/* ══════════════════════════════════════
   DESK
══════════════════════════════════════ */
.desk{
  position:absolute;
  right:0;bottom:9%;
  width:58%;height:38%;z-index:22;
}
.desk-ledge{
  position:absolute;top:0;left:0;right:0;height:18px;
  background:linear-gradient(180deg,#7c5232,#5c3a20);
  border-top:2px solid #9e6a42;
  box-shadow:0 4px 16px rgba(0,0,0,.62);
}
.desk-top{
  position:absolute;top:18px;left:0;right:0;height:72px;
  background:linear-gradient(180deg,#4e3016 0%,#3e2612 70%,#341e0c 100%);
  box-shadow:inset 0 -10px 30px rgba(0,0,0,.42);
  overflow:hidden;
}
.desk-top::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(248,175,48,.1) 0%,transparent 40%),
    repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,0,0,.03) 61px);
}
/* wood grain lines */
.desk-top::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(180deg,transparent 30%,rgba(0,0,0,.06) 31%,transparent 32%),
    linear-gradient(180deg,transparent 55%,rgba(0,0,0,.05) 56%,transparent 57%),
    linear-gradient(180deg,transparent 78%,rgba(0,0,0,.06) 79%,transparent 80%);
}
.desk-front{
  position:absolute;top:90px;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,#2e1c0a 0%,#1e1005 100%);
  border-top:1px solid #4c3016;
}
/* desk leg detail */
.desk-front::before{
  content:'';position:absolute;
  left:10%;top:0;width:6px;bottom:0;
  background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(0,0,0,.1));
}
.desk-front::after{
  content:'';position:absolute;
  right:12%;top:0;width:6px;bottom:0;
  background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(0,0,0,.1));
}

/* ══════════════════════════════════════
   VIGNETTE + PARTICLES
══════════════════════════════════════ */
.vignette{
  position:absolute;inset:0;z-index:46;pointer-events:none;
  background:radial-gradient(ellipse at 38% 50%,transparent 28%,rgba(0,0,0,.7) 100%);
}
#particles{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:47;pointer-events:none;
}
#typewriter-modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:210;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(4px);
}
#typewriter-modal.open{
  display:flex;
}
#typewriter-modal .modal-panel{
  position:relative;
  width:min(860px,92vw);
  max-height:min(78vh,700px);
  background:linear-gradient(145deg,#131313,#252525);
  border:3px solid #5b1818;
  border-radius:20px;
  box-shadow:0 0 80px rgba(0,0,0,.95);
  padding:22px;
  overflow:hidden;
}
#typewriter-modal #modal-close{
  position:absolute;
  top:18px;
  right:18px;
  width:56px;
  height:56px;
  background:#4d0202;
  border:3px solid #7d0202;
  border-radius:16px;
  color:#f6b6b6;
  font-size:30px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:transform .17s ease, background .17s ease;
  z-index:2;
}
#typewriter-modal #modal-close:hover{
  transform:scale(1.06);
  background:#7b0505;
}
#typewriter-modal #modal-paper{
  position:relative;
  height:210px;
  background:#f7f1e9;
  border:3px solid #aa8d53;
  border-radius:20px;
  padding:20px;
  font-family:monospace;
  font-size:15px;
  color:#2a2a2a;
  line-height:1.6;
  overflow:auto;
  box-shadow:inset 0 10px 30px rgba(0,0,0,.12);
}
#typewriter-modal #modal-paper #paper-text{
  white-space:pre-wrap;
  word-break:break-word;
}
#typewriter-modal #modal-keyboard{
  margin-top:18px;
  background:#181818;
  border:2px solid #333;
  border-radius:18px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
#typewriter-modal button.key-btn{
  min-width:48px;
  min-height:46px;
  background:#252525;
  border:2px solid #3d3d3d;
  color:#d4b765;
  font-family:monospace;
  font-size:14px;
  border-radius:10px;
  cursor:pointer;
  transition:transform .14s ease, background .14s ease;
}
#typewriter-modal button.key-btn:hover{
  background:#313131;
  transform:translateY(-1px);
}
#typewriter-modal button.special-key{
  min-width:90px;
  background:#2e2e2e;
  border-color:#4a4a4a;
}
#typewriter-modal #inventory-box{
  position:absolute;
  bottom:20px;
  right:20px;
  width:190px;
  min-height:96px;
  background:rgba(16,6,6,.96);
  border:2px solid #7c1515;
  border-radius:20px;
  padding:16px;
  color:#e3c77b;
  font-family:monospace;
  box-shadow:0 0 28px rgba(120,10,10,.32);
}
#typewriter-modal #inventory-box .inv-title{
  font-weight:bold;
  margin-bottom:10px;
  color:#ffd87f;
}
#typewriter:hover {
  transform:scale(1.02);
  filter:drop-shadow(0 0 20px rgba(151, 18, 8, 0.75)) drop-shadow(0 0 28px rgba(255,100,48,.45));
}
#typewriter {
  transition:transform .2s ease, filter .2s ease;
  cursor:pointer;
}
.page-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:62px;
  height:124px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(16,8,6,.62);
  border:1px solid rgba(255,80,80,.24);
  border-radius:28px;
  color:#ffc2c2;
  text-decoration:none;
  font-family:system-ui, sans-serif;
  font-size:.76rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-align:center;
  backdrop-filter:blur(8px);
  z-index:220;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}
.page-nav:hover{
  transform:translateY(-50%) scale(1.04);
  box-shadow:0 0 30px rgba(255,80,80,.28);
  border-color:rgba(255,120,120,.5);
}
.page-nav-left{left:18px;}
.page-nav-right{right:18px;}
.page-nav-icon{font-size:1.5rem;line-height:1;}
</style>
</head>
<body>
<div class="scene" id="scene">

  <!-- WALL -->
  <div class="wall"></div>

  <!-- WINDOW AMBIENT GLOW -->
  <div class="win-glow"></div>

  <!-- FLOOR LIGHT PATCH -->
  <div class="floor-light"></div>

  <!-- LIGHT RAYS -->
  <div class="rays" id="rays">
    <div class="ray" style="left:16%;width:44px;transform:rotate(9deg)"></div>
    <div class="ray" style="left:23%;width:22px;transform:rotate(13deg);opacity:.65"></div>
    <div class="ray" style="left:12%;width:56px;transform:rotate(6deg);opacity:.5"></div>
    <div class="ray" style="left:28%;width:24px;transform:rotate(17deg);opacity:.42"></div>
    <div class="ray" style="left:19%;width:14px;transform:rotate(10.5deg);opacity:.38"></div>
  </div>

  <!-- ══ WINDOW ══ -->
  <div class="win">

    <!-- Warm backlight -->
    <div class="win-light">

      <!-- PLANTS SVG -->
      <div class="plants">
        <svg width="100%" height="100%" viewBox="0 0 280 370"
             xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="xMidYMax meet">

          <!-- STEMS / VINES -->
          <path d="M108 370 C103 305 80 258 94 192 C100 164 114 150 124 161"
                stroke="#182a0d" stroke-width="4.5" fill="none" stroke-linecap="round"/>
          <path d="M152 370 C146 298 163 250 145 190 C138 164 130 150 134 138"
                stroke="#142208" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M65 370 C60 318 38 285 54 245 C64 220 80 215 90 230"
                stroke="#1c2e12" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M198 370 C193 322 208 285 190 235"
                stroke="#162008" stroke-width="2.8" fill="none" stroke-linecap="round"/>
          <path d="M234 370 C230 335 245 308 225 278"
                stroke="#142008" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M30 370 C26 340 14 318 25 295 C32 280 46 278 52 292"
                stroke="#1a2c0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <!-- LARGE LEAVES -->
          <!-- Leaf 1 – left reach -->
          <path d="M94 192 C50 174 20 146 38 112 C52 86 78 84 94 103
                   C105 118 102 150 94 192"
                fill="#182808" opacity=".96"/>
          <!-- Leaf 2 – right reach from main stem -->
          <path d="M124 161 C168 134 196 144 184 175
                   C175 198 152 200 124 161"
                fill="#1d3010" opacity=".92"/>
          <!-- Leaf 3 – upward from second stem -->
          <path d="M134 138 C108 100 112 68 140 62
                   C162 58 175 78 160 106 C150 124 134 138 134 138"
                fill="#162208" opacity=".94"/>
          <!-- Leaf 4 – left medium -->
          <path d="M90 230 C46 206 16 220 18 252
                   C22 278 56 288 90 230"
                fill="#1a2a0c" opacity=".9"/>
          <!-- Leaf 5 – far left -->
          <path d="M54 245 C28 274 4 280 0 258
                   C-4 234 14 218 54 245"
                fill="#142008" opacity=".88"/>
          <!-- Leaf 6 – right from stem 4 -->
          <path d="M190 235 C228 208 254 218 248 250
                   C240 272 215 274 190 235"
                fill="#1c2e0f" opacity=".87"/>
          <!-- Leaf 7 – mid branch from stem 2 -->
          <path d="M145 190 C182 173 208 183 200 208
                   C192 228 168 230 145 190"
                fill="#182808" opacity=".9"/>
          <!-- Leaf 8 – low left -->
          <path d="M69 305 C44 288 34 299 40 315
                   C46 330 63 328 69 305"
                fill="#1a2a10" opacity=".87"/>
          <!-- Leaf 9 – low right -->
          <path d="M166 312 C188 298 200 311 196 328
                   C190 342 170 340 166 312"
                fill="#162208" opacity=".84"/>
          <!-- Leaf 10 – stem 5 branch -->
          <path d="M225 278 C252 260 268 270 262 294
                   C256 314 232 316 225 278"
                fill="#1a2810" opacity=".85"/>
          <!-- Leaf 11 – bottom spread left -->
          <path d="M108 370 C68 342 28 332 22 357
                   C16 378 50 390 108 370"
                fill="#0f1c06" opacity=".92"/>
          <!-- Leaf 12 – bottom spread right -->
          <path d="M152 370 C185 348 215 344 220 368
                   C224 386 190 395 152 370"
                fill="#121e08" opacity=".9"/>
          <!-- Leaf 13 – lower stem 6 -->
          <path d="M52 292 C28 305 14 320 20 335
                   C26 348 48 342 52 292"
                fill="#1c2e0e" opacity=".82"/>

          <!-- SEMI-TRANSLUCENT BACKLIT LEAVES -->
          <path d="M112 136 C87 110 91 78 114 72
                   C133 68 146 87 130 114 C122 130 112 136 112 136"
                fill="#2a4818" opacity=".62"/>
          <path d="M170 150 C196 126 218 133 212 160
                   C206 182 182 184 170 150"
                fill="#243d14" opacity=".56"/>
          <path d="M76 250 C50 265 36 280 44 294
                   C52 306 74 298 76 250"
                fill="#1e3010" opacity=".68"/>
          <path d="M200 255 C224 240 238 250 232 268
                   C226 284 204 284 200 255"
                fill="#1c2e0e" opacity=".55"/>

          <!-- WINDOWSILL DEBRIS / PAPERS -->
          <rect x="10"  y="345" width="52" height="22" rx="1.5"
                fill="#c8bc98" opacity=".68"
                transform="rotate(-7 36 356)"/>
          <rect x="188" y="350" width="60" height="17" rx="1.5"
                fill="#b8aa88" opacity=".58"
                transform="rotate(5 218 358)"/>
          <rect x="98"  y="354" width="34" height="11" rx="1"
                fill="#c0b490" opacity=".52"
                transform="rotate(-3 115 359)"/>
          <!-- Pebble/debris -->
          <ellipse cx="75" cy="363" rx="5" ry="3.5" fill="#5a4020" opacity=".6"/>
          <ellipse cx="155" cy="360" rx="4" ry="3" fill="#4a3218" opacity=".55"/>
        </svg>
      </div>

      <!-- Glass grime -->
      <div class="win-grime"></div>
    </div>

    <!-- Window pane cross -->
    <div class="win-cross"></div>

    <!-- Window frame -->
    <div class="win-frame"></div>

    <!-- BLINDS (generated by JS) -->
    <div class="blinds" id="blinds"></div>

    <!-- Windowsill -->
    <div class="sill"></div>
  </div>

  <!-- FLOOR -->
  <div class="floor"></div>

  <!-- ══ BULLETIN BOARD ══ -->
  <div class="board">
    <div class="board-bg" id="board"></div>
  </div>

  <!-- ══ DESK ══ -->
  <div class="desk">
    <div class="desk-ledge"></div>
    <div class="desk-top" id="desk-top"></div>
    <div class="desk-front">
      <!-- Drawer 1 -->
      <div style="position:absolute;left:18%;top:12%;width:26%;height:26%;
                  background:linear-gradient(180deg,#261808,#1c1004);
                  border-top:1px solid #3e2a12;border-bottom:1px solid #160e04;
                  display:flex;align-items:center;justify-content:center;">
        <div style="width:36%;height:5px;background:#3a2810;border-radius:2px;
                    box-shadow:0 1px 4px rgba(0,0,0,.6)"></div>
      </div>
      <!-- Drawer 2 -->
      <div style="position:absolute;left:18%;top:42%;width:26%;height:26%;
                  background:linear-gradient(180deg,#221604,#181002);
                  border-top:1px solid #3e2a12;border-bottom:1px solid #120c04;
                  display:flex;align-items:center;justify-content:center;">
        <div style="width:36%;height:5px;background:#38280e;border-radius:2px;
                    box-shadow:0 1px 4px rgba(0,0,0,.6)"></div>
      </div>
    </div>

    <!-- ══ TYPEWRITER SVG ══ -->
    <svg id="typewriter"
         style="position:absolute;right:20%;bottom:72%;width:35%;z-index:26;"
         viewBox="0 0 248 186" xmlns="http://www.w3.org/2000/svg">

    <!-- TYPEWRITER SHADOW -->
     
    <!-- ── BASE PLATFORM ── -->
    <rect x="3"  y="130" width="242" height="44" rx="5" fill="#2c3832"/>
    <rect x="0"  y="138" width="248" height="6"  rx="2" fill="#232e2a"/>
    <rect x="2"  y="164" width="244" height="8"  rx="3" fill="#1e2820"/>
    <!-- Base rim highlight -->

// ─────────────────────────────────────
//  DUST PARTICLE SYSTEM
// ─────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
const scene  = document.getElementById('scene');

let W, H;
function resize(){
  W = canvas.width  = scene.offsetWidth;
  H = canvas.height = scene.offsetHeight;
}
resize();
new ResizeObserver(resize).observe(scene);

// spawn more particles near window, fewer elsewhere
const pts = Array.from({length:110}, (_, i) => {
  const nearWindow = i < 80;
  return {
    x:  nearWindow
          ? Math.random() * W * 0.52 + W * 0.07
          : Math.random() * W * 0.75,
    y:  Math.random() * H,
    vx: (Math.random() - .46) * .2,
    vy: -(Math.random() * .32 + .04),
    r:  Math.random() * 1.5 + .28,
    a:  Math.random() * (nearWindow ? .52 : .25) + .08,
    ph: Math.random() * Math.PI * 2,
    sp: Math.random() * .0045 + .0018,
    warm: nearWindow,
  };
});

function tick(){
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x  += p.vx + Math.sin(p.ph) * .11;
    p.y  += p.vy;
    p.ph += p.sp;

    if(p.y < -4){
      p.y = H * .92;
      p.x = p.warm
        ? Math.random() * W * .5 + W * .07
        : Math.random() * W * .75;
      p.a = Math.random() * (p.warm ? .52 : .22) + .08;
    }
    if(p.x < 0 || p.x > W * .65) p.vx *= -1;

    // intensity falls off moving away from window
    const wFade = p.warm
      ? Math.max(0, 1 - Math.max(0, p.x - W*.55) / (W*.12))
      : 1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.warm
      ? `rgba(255,205,88,${p.a * wFade * .82})`
      : `rgba(220,185,120,${p.a * .4})`;
    ctx.fill();
  });
  requestAnimationFrame(tick);
}
tick();

// ─────────────────────────────────────
//  TYPEWRITER INTERACTIVE PANEL
// ─────────────────────────────────────
class Inventory {
  constructor() {
    this.maxKeys = 1;
    this.load();
  }

  load() {
    const data = localStorage.getItem('typewriter-inventory');
    this.keys = data ? parseInt(data, 10) : 0;
  }

  save() {
    localStorage.setItem('typewriter-inventory', this.keys.toString());
  }

  addKey() {
    if (this.keys < this.maxKeys) {
      this.keys += 1;
      this.save();
      this.updateUI();
      return true;
    }
    return false;
  }

  updateUI() {
    const count = document.getElementById('inv-keys');
    if (count) {
      count.textContent = `Ключ: ${this.keys} / ${this.maxKeys}`;
    }
  }
}

const inventory = new Inventory();
inventory.updateUI();

const typewriterEl = document.getElementById('typewriter');
const modal = document.getElementById('typewriter-modal');
const closeBtn = document.getElementById('modal-close');
const paperText = document.getElementById('paper-text');
const keyboard = document.getElementById('modal-keyboard');

let currentText = '';
let modalOpen = false;
let closeTimer = null;

const keyRows = [
  ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
  ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
  ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
];

function createKeyboardUI() {
  keyboard.innerHTML = '';

  keyRows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.style.cssText = 'display:flex;gap:10px;justify-content:center;flex-wrap:wrap';

    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.textContent = key;
      btn.onclick = () => typeKey(key);
      btn.onmousedown = () => btn.style.transform = 'scale(0.96)';
      btn.onmouseup = () => btn.style.transform = 'scale(1)';
      btn.onmouseleave = () => btn.style.transform = 'scale(1)';
      rowDiv.appendChild(btn);
    });

    keyboard.appendChild(rowDiv);
  });

  const specialRow = document.createElement('div');
  specialRow.style.cssText = 'display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px';

  const spaceBtn = document.createElement('button');
  spaceBtn.className = 'key-btn special-key';
  spaceBtn.textContent = 'SPACE';
  spaceBtn.style.minWidth = '220px';
  spaceBtn.onclick = () => typeKey(' ');
  specialRow.appendChild(spaceBtn);

  const backBtn = document.createElement('button');
  backBtn.className = 'key-btn special-key';
  backBtn.textContent = '← BACK';
  backBtn.onclick = () => {
    if (currentText.length > 0) {
      currentText = currentText.slice(0, -1);
      updatePaper();
    }
  };
  specialRow.appendChild(backBtn);

  const enterBtn = document.createElement('button');
  enterBtn.className = 'key-btn special-key';
  enterBtn.textContent = 'ENTER';
  enterBtn.onclick = () => typeKey('\n');
  specialRow.appendChild(enterBtn);

  keyboard.appendChild(specialRow);
}

function updatePaper() {
  if (paperText) {
    paperText.textContent = currentText;
  }
}

function openModal() {
  clearTimeout(closeTimer);
  if (modalOpen) return;
  modalOpen = true;
  currentText = '';
  updatePaper();
  createKeyboardUI();
  modal.classList.add('open');
}

function closeModal() {
  modalOpen = false;
  modal.classList.remove('open');
  currentText = '';
}

function typeKey(key) {
  currentText += key;
  updatePaper();

  if (currentText.toLowerCase().trim() === 'key') {
    setTimeout(() => {
      if (inventory.addKey()) {
        alert('🔑 Ключ добавлен в инвентарь!');
      }
      closeModal();
    }, 120);
  }
}

if (typewriterEl) {
  typewriterEl.style.cursor = 'pointer';
  typewriterEl.onclick = openModal;
}

if (closeBtn) {
  closeBtn.onclick = closeModal;
}
</script>
